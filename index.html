<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
  <div id="app">
    <div class="container mt-5">
      <h1>Employee Management</h1>
      <form @submit.prevent="addEmployee" class="mb-4">
        <div class="row">
          <div class="col-md-2">
            <input v-model="newEmployee.id" type="text" class="form-control" placeholder="ID" required>
          </div>
          <div class="col-md-2">
            <input v-model="newEmployee.name" type="text" class="form-control" placeholder="Name" required>
          </div>
          <div class="col-md-2">
            <input v-model="newEmployee.designation" type="text" class="form-control" placeholder="Designation" required>
          </div>
          <div class="col-md-2">
            <input v-model="newEmployee.department" type="text" class="form-control" placeholder="Department" required>
          </div>
          <div class="col-md-2">
            <input v-model="newEmployee.salary" type="number" class="form-control" placeholder="Salary" required>
          </div>
          <div class="col-md-2">
            <button type="submit" class="btn btn-primary">Add Employee</button>
          </div>
        </div>
      </form>
      <table class="table table-striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Designation</th>
            <th>Department</th>
            <th>Salary</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="employee in employees" :key="employee.id">
            <td>{{ employee.id }}</td>
            <td>{{ employee.name }}</td>
            <td>{{ employee.designation }}</td>
            <td>{{ employee.department }}</td>
            <td>{{ employee.salary }}</td>
            <td>
              <button @click="editEmployee(employee)" class="btn btn-warning btn-sm">Edit</button>
              <button @click="deleteEmployee(employee.id)" class="btn btn-danger btn-sm">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
      <!-- Edit Modal -->
      <div v-if="editingEmployee" class="modal" style="display: block;">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Edit Employee</h5>
              <button @click="cancelEdit" class="btn-close"></button>
            </div>
            <div class="modal-body">
              <form @submit.prevent="updateEmployee">
                <div class="mb-3">
                  <label>ID</label>
                  <input v-model="editingEmployee.id" type="text" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label>Name</label>
                  <input v-model="editingEmployee.name" type="text" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label>Designation</label>
                  <input v-model="editingEmployee.designation" type="text" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label>Department</label>
                  <input v-model="editingEmployee.department" type="text" class="form-control" required>
                </div>
                <div class="mb-3">
                  <label>Salary</label>
                  <input v-model="editingEmployee.salary" type="number" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">Update</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const { createApp, ref, onMounted } = Vue;

    const API_URL = 'https://69eb1f7a97482ad5c5272483.mockapi.io/api/employee';

    createApp({
      setup() {
        const employees = ref([]);
        const newEmployee = ref({ id: '', name: '', designation: '', department: '', salary: '' });
        const editingEmployee = ref(null);

        const fetchEmployees = async () => {
          try {
            const response = await axios.get(API_URL);
            employees.value = response.data;
          } catch (error) {
            console.error(error);
          }
        };

        const addEmployee = async () => {
          try {
            await axios.post(API_URL, newEmployee.value);
            newEmployee.value = { id: '', name: '', designation: '', department: '', salary: '' };
            fetchEmployees();
          } catch (error) {
            console.error(error);
          }
        };

        const editEmployee = (employee) => {
          editingEmployee.value = { ...employee };
        };

        const updateEmployee = async () => {
          try {
            await axios.put(`${API_URL}/${editingEmployee.value.id}`, editingEmployee.value);
            editingEmployee.value = null;
            fetchEmployees();
          } catch (error) {
            console.error(error);
          }
        };

        const cancelEdit = () => {
          editingEmployee.value = null;
        };

        const deleteEmployee = async (id) => {
          try {
            await axios.delete(`${API_URL}/${id}`);
            fetchEmployees();
          } catch (error) {
            console.error(error);
          }
        };

        onMounted(fetchEmployees);

        return {
          employees,
          newEmployee,
          editingEmployee,
          addEmployee,
          editEmployee,
          updateEmployee,
          cancelEdit,
          deleteEmployee
        };
      }
    }).mount('#app');
  </script>
  <style>
    .modal {
      background: rgba(0,0,0,0.5);
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</body>
</html>
